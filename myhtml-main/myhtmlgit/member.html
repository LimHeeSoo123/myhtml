		}

            height: 30px;

		const hlength = hobby.length;

		let hobbyStr = "";
		for(let i=0; i<hlength; i++)
		{
			if(hobby[i].checked)
				hobbySt == hobby[i].value+" ";
		}
		let str = id + "\n" + name + "\n" + gender + "\n";

		alert(str);


	}
</script>
</head>


<body>
